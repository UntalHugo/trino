services:

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: trino_db
      POSTGRES_USER: trino_user
      POSTGRES_PASSWORD: trino_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  web:
    build: .
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
