<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirigiendo...</title>
    <style>body { background: #0a0a0f; color: #e8e8f0; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }</style>
</head>
<body>
    <p>Redirigiendo al feed...</p>
    <script>
        (async function() {
            let success = false;
            try {
                const res = await fetch('/api/users/session-token/', { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    success = true;
                }
            } catch (e) {}
            if (success) {
                window.location.href = '/feed/';
            } else {
                window.location.href = '/accounts/login/?error=oauth_failed';
            }
        })();
    </script>
</body>
</html>
