<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trino — Mensajes</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0a0a0f; --surface: #111118; --surface2: #16161f; --border: #1e1e2e; --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.2); --text: #e8e8f0; --muted: #5a5a7a; --like: #ff4f6d; --success: #4fffb0; }
        [data-theme="light"] { --bg: #ffffff; --surface: #f5f5f8; --surface2: #e8e8f0; --border: #d0d0da; --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.15); --text: #0a0a0f; --muted: #8a8aaa; --like: #e0455e; --success: #2ea87a; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: grid; grid-template-columns: 260px 1fr 300px; max-width: 1200px; margin: 0 auto; }
        /* ── SIDEBAR IZQUIERDO ── */
        .sidebar-left {
            padding: 1.5rem 1rem;
            border-right: 1px solid var(--border);
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -1px;
        }

        .logo span { color: var(--accent); }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            cursor: pointer;
        }

        .nav-item:hover { background: var(--surface2); }
        .nav-item.active { color: var(--accent); background: rgba(108,99,255,0.08); }

        .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }

        .btn-logout {
            background: none;
            border: 1px solid rgba(255, 79, 109, 0.3);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            color: #ff4f6d;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-logout:hover { background: rgba(255, 79, 109, 0.1); border-color: #ff4f6d; }

        .btn-theme {
            background: none;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-theme:hover { background: var(--surface2); border-color: var(--accent); }

        .user-card {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .user-card:hover { background: var(--surface2); }

        .avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #63b3ff);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.875rem; color: #fff;
            flex-shrink: 0;
        }

        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-size: 0.875rem; font-weight: 600; }
        .user-handle { font-size: 0.75rem; color: var(--muted); }

        .sidebar-right { padding: 1.5rem 1rem; }
        .main-content { padding: 1.5rem 2rem; display: flex; flex-direction: column; height: 100vh; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-shrink: 0; }
        .page-header h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .btn-compose { background: none; border: 1px solid var(--border); color: var(--accent); padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; transition: all 0.15s; }
        .btn-compose:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .chat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: all 0.15s; }
        .chat-card:hover { border-color: var(--accent); }
        .chat-card.selected { border-color: var(--accent); background: var(--surface2); }
        .chat-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-avatar .initial { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 1rem; }
        .chat-body { flex: 1; min-width: 0; }
        .chat-body .name { font-weight: 600; font-size: 0.9rem; }
        .chat-body .preview { font-size: 0.82rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 0.1rem; }
        .chat-body .time { font-size: 0.72rem; color: var(--muted); }
        .chat-conversation { flex: 1; display: none; flex-direction: column; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }
        .chat-conversation.active { display: flex; }
        .conversation-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); font-weight: 600; display: flex; align-items: center; gap: 0.75rem; }
        .conversation-header .back-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1.2rem; display: none; }
        .messages-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .msg { max-width: 80%; padding: 0.6rem 1rem; border-radius: 16px; font-size: 0.88rem; line-height: 1.4; word-wrap: break-word; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }
        .msg .msg-time { font-size: 0.65rem; opacity: 0.6; margin-top: 0.3rem; text-align: right; }
        .composer-row { display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid var(--border); flex-shrink: 0; }
        .composer-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 0.65rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; }
        .composer-row input:focus { border-color: var(--accent); }
        .composer-row button { background: var(--accent); border: none; border-radius: 20px; padding: 0.65rem 1.2rem; color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: opacity 0.15s; }
        .composer-row button:hover { opacity: 0.9; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
        .empty-state svg { width: 60px; height: 60px; opacity: 0.3; margin-bottom: 1rem; }
        .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 1.3rem; color: var(--text); margin-bottom: 0.5rem; }
        .loading { text-align: center; padding: 3rem; color: var(--muted); }

        /* ── RIGHT SIDEBAR WIDGETS ── */
        .search-box { position: relative; margin-bottom: 1.5rem; }
        .search-box input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 0.65rem 1rem 0.65rem 2.25rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.875rem; outline: none; transition: border-color 0.2s; }
        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: var(--muted); }
        .search-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; }
        .widget { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
        .widget h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 1rem; }
        .suggest-user { display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0; }
        .suggest-info { flex: 1; }
        .suggest-name { font-size: 0.875rem; font-weight: 600; }
        .suggest-handle { font-size: 0.75rem; color: var(--muted); }
        .btn-follow-small { background: none; border: 1px solid var(--accent); border-radius: 20px; padding: 0.3rem 0.85rem; color: var(--accent); font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: background 0.15s, color 0.15s; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
        .btn-follow-small:hover { background: var(--accent); color: #fff; }

        /* ── COMPOSE MODAL (publicación) ── */
        .compose-post-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200; justify-content: center; align-items: center; }
        .compose-post-overlay.open { display: flex; }
        .compose-post { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 520px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .compose-post-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
        .compose-post-header h3 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
        .compose-post-close { background: none; border: none; color: var(--muted); font-size: 1.25rem; cursor: pointer; padding: 0.25rem; border-radius: 6px; transition: color 0.15s; }
        .compose-post-close:hover { color: var(--text); }
        .compose-post-body { padding: 1.25rem; }
        .compose-post-composer { display: flex; gap: 0.75rem; }
        .compose-post-input-wrap { flex: 1; }
        .compose-post-input-wrap textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; resize: none; min-height: 80px; }
        .compose-post-input-wrap textarea::placeholder { color: var(--muted); }
        .compose-post-actions { display: flex; align-items: center; justify-content: space-between; padding-top: 0.75rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
        .compose-post-tools { display: flex; gap: 0.5rem; }

        .btn-post {
            margin-top: 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.85rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px var(--accent-glow);
            width: 100%;
        }

        .btn-post:hover { opacity: 0.9; box-shadow: 0 6px 24px rgba(108,99,255,0.35); }

        .compose-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .compose-modal-overlay.open { display: flex; }
        .compose-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 420px; }
        .compose-modal h3 { font-family: 'Syne', sans-serif; margin-bottom: 1rem; }
        .compose-modal input, .compose-modal textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; margin-bottom: 0.75rem; }
        .compose-modal input:focus, .compose-modal textarea:focus { border-color: var(--accent); }
        .compose-modal textarea { min-height: 80px; resize: vertical; }
        .compose-modal .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
        .compose-modal .modal-actions button { padding: 0.6rem 1.2rem; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none; transition: opacity 0.15s; }
        .compose-modal .btn-cancel { background: var(--surface2); color: var(--muted); }
        .compose-modal .btn-send { background: var(--accent); color: #fff; }
        .compose-modal .btn-send:hover, .compose-modal .btn-cancel:hover { opacity: 0.85; }
        .error-banner { background: rgba(255,79,109,0.1); border: 1px solid rgba(255,79,109,0.2); border-radius: 10px; padding: 0.8rem 1rem; color: var(--like); font-size: 0.85rem; margin-bottom: 1rem; display: none; }
        @media (max-width: 1024px) {
            body { grid-template-columns: 70px 1fr; }
            .sidebar-right { display: none; }
            .nav-item span:not(.nav-icon) { display: none; }
            .logo span { display: none; }
            .btn-post { padding: 0.85rem; font-size: 0; }
            .btn-post::before { content: '✏️'; font-size: 1.1rem; }
            .user-card .user-info { display: none; }
        }
        @media (max-width: 640px) {
            body { grid-template-columns: 1fr; }
            .sidebar-left { display: none; }
            .conversation-header .back-btn { display: inline-block; }
        }
    </style>
</head>
<body>
    <nav class="sidebar-left">
        <div class="logo">🐦 <span>Trino</span></div>

        <a class="nav-item" href="/feed/">
            <span class="nav-icon">🏠</span> Inicio
        </a>
        <a class="nav-item" href="/search/" id="nav-explore">
            <span class="nav-icon">🔍</span> Explorar
        </a>
        <a class="nav-item" href="/notifications/" id="nav-notifs">
            <span class="nav-icon">🔔</span> Notificaciones
        </a>
        <a class="nav-item active" href="/messages/" id="nav-messages">
            <span class="nav-icon">✉️</span> Mensajes
        </a>
        <a class="nav-item" href="/profile/" id="nav-profile">
            <span class="nav-icon">👤</span> Perfil
        </a>

        <button class="btn-post" id="btn-post">
            Trinar
        </button>

        <button class="btn-logout" id="btn-logout">
            🚪 Cerrar sesión
        </button>

        <button class="btn-theme" id="btn-theme" title="Cambiar tema">
            🌙
        </button>

        <div class="user-card" id="user-card">
            <div class="avatar" id="user-avatar">?</div>
            <div class="user-info">
                <div class="user-name" id="user-name">Cargando...</div>
                <div class="user-handle" id="user-handle">@...</div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1>Mensajes</h1>
            <button class="btn-compose" id="btn-compose">✏️ Nuevo mensaje</button>
        </div>
        <div class="error-banner" id="error-banner"></div>

        <div style="display:flex;flex:1;gap:0.75rem;overflow:hidden;">
            <div id="conversations-list" style="flex:1;overflow-y:auto;min-width:0;">
                <div class="loading">Cargando mensajes...</div>
            </div>

            <div class="chat-conversation" id="chat-conversation">
                <div class="conversation-header">
                    <button class="back-btn" id="chat-back-btn">←</button>
                    <span id="chat-partner-name">Seleccioná una conversación</span>
                </div>
                <div class="messages-list" id="messages-list">
                    <div class="empty-state" style="padding:2rem;"><h2>Seleccioná un chat</h2><p>Elegí una conversación para ver los mensajes.</p></div>
                </div>
                <div class="composer-row" id="composer-row" style="display:none;">
                    <input type="text" id="msg-input" placeholder="Escribí un mensaje..." maxlength="500">
                    <button id="btn-send-msg">Enviar</button>
                </div>
            </div>
        </div>
    </main>

    <aside class="sidebar-right">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Buscar en Trino" id="search-input">
        </div>
        <div class="widget">
            <h3>A quién seguir</h3>
            <div id="suggestions-container"></div>
        </div>
    </aside>

    <!-- COMPOSE POST MODAL -->
    <div class="compose-post-overlay" id="compose-post-modal">
        <div class="compose-post">
            <div class="compose-post-header">
                <h3>Crear publicación</h3>
                <button class="compose-post-close" id="compose-post-close">✕</button>
            </div>
            <div class="compose-post-body">
                <div class="compose-post-composer">
                    <div class="avatar" id="compose-post-avatar">?</div>
                    <div class="compose-post-input-wrap">
                        <textarea id="compose-post-input" placeholder="¿Qué está pasando?" maxlength="280" rows="3"></textarea>
                        <div class="compose-post-actions">
                            <div class="compose-post-tools">
                                <button class="tool-btn" id="compose-post-image-btn" title="Imagen">🖼️</button>
                                <button class="tool-btn" id="compose-post-hashtag-btn" title="Hashtag">＃</button>
                                <button class="tool-btn" id="compose-post-mention-btn" title="Mencionar">@</button>
                            </div>
                            <div style="display:flex;align-items:center;">
                                <span class="char-count" id="compose-post-char-count">280</span>
                                <button class="btn-trinar" id="compose-post-btn-trinar">Trinar</button>
                            </div>
                        </div>
                        <input type="file" id="compose-post-image-input" accept="image/*" style="display:none">
                        <div id="compose-post-image-preview" style="display:none;position:relative;margin-top:0.5rem;">
                            <img id="compose-post-image-preview-img" style="max-height:200px;border-radius:12px;border:1px solid var(--border);width:100%;object-fit:cover;">
                            <button id="compose-post-btn-clear-image" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);border:none;border-radius:50%;width:28px;height:28px;color:#fff;cursor:pointer;font-size:0.9rem;">✕</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="compose-modal-overlay" id="compose-modal">
        <div class="compose-modal">
            <h3>Nuevo mensaje</h3>
            <input type="text" id="compose-username" placeholder="Usuario (ej: tobias)" autocomplete="off">
            <textarea id="compose-content" placeholder="Escribí tu mensaje..." maxlength="500"></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="compose-cancel">Cancelar</button>
                <button class="btn-send" id="compose-send">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        let accessToken = localStorage.getItem('access_token') || '';
        let currentUser = null;
        let messages = [];
        let selectedPartner = null;
        let conversations = {};

        async function fetchWithAuth(url, options) {
            if (!accessToken) { window.location.href = '/accounts/login/'; return null; }
            options = options || {};
            options.headers = options.headers || {};
            options.headers['Authorization'] = 'Bearer ' + accessToken;
            if (!(options.body instanceof FormData)) { options.headers['Content-Type'] = 'application/json'; }
            var res = await fetch(url, options);
            if (res.status === 401) {
                var rt = localStorage.getItem('refresh_token');
                if (rt) {
                    try {
                        var rr = await fetch('/api/auth/refresh/', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({refresh:rt}) });
                        var rd = await rr.json();
                        if (rd.access) {
                            localStorage.setItem('access_token', rd.access);
                            accessToken = rd.access;
                            options.headers['Authorization'] = 'Bearer ' + accessToken;
                            res = await fetch(url, options);
                        }
                    } catch(e) {}
                }
                if (res.status === 401) { localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token'); window.location.href = '/accounts/login/'; return null; }
            }
            return res;
        }

        async function loadProfile() {
            try {
                var res = await fetchWithAuth('/api/users/profile/');
                if (!res || !res.ok) return;
                currentUser = await res.json();
                var initial = (currentUser.username || '?')[0].toUpperCase();
                var el = document.getElementById('user-avatar');
                if (currentUser.avatar) { el.innerHTML = '<img src="' + currentUser.avatar + '">'; }
                else { el.textContent = initial; }
                document.getElementById('user-name').textContent = currentUser.username;
                document.getElementById('user-handle').textContent = '@' + currentUser.username;
            } catch(e) { console.error(e); }
        }

        async function loadMessages() {
            var list = document.getElementById('conversations-list');
            try {
                var res = await fetchWithAuth('/api/messages/');
                if (!res || !res.ok) { list.innerHTML = '<div class="empty-state"><h2>Error al cargar</h2></div>'; return; }
                messages = await res.json();
                var all = messages.results || messages;
                if (!all || all.length === 0) {
                    list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><h2>Sin mensajes</h2><p>No tenés conversaciones todavía. Enviále un mensaje a alguien.</p></div>';
                    return;
                }
                groupConversations(all);
                renderConversations();
            } catch(e) { list.innerHTML = '<div class="empty-state"><h2>Error de conexión</h2></div>'; }
        }

        function groupConversations(all) {
            conversations = {};
            all.forEach(function(m) {
                var partner;
                if (m.sender && m.sender.id === currentUser.id) {
                    partner = m.receiver_info || { username: 'desconocido' };
                } else {
                    partner = m.sender || { username: 'desconocido' };
                }
                var key = partner.username;
                if (!conversations[key]) { conversations[key] = { partner: partner, messages: [], lastMsg: null }; }
                conversations[key].messages.push(m);
                if (!conversations[key].lastMsg || new Date(m.created_at) > new Date(conversations[key].lastMsg.created_at)) {
                    conversations[key].lastMsg = m;
                }
            });
        }

        function renderConversations() {
            var list = document.getElementById('conversations-list');
            var html = '';
            var keys = Object.keys(conversations).sort(function(a, b) {
                return new Date(conversations[b].lastMsg.created_at) - new Date(conversations[a].lastMsg.created_at);
            });
            keys.forEach(function(key) {
                var conv = conversations[key];
                var p = conv.partner;
                var username = p.username || 'usuario';
                var avatarUrl = p.avatar || null;
                var initial = username[0].toUpperCase();
                var preview = conv.lastMsg ? conv.lastMsg.content : '';
                var time = conv.lastMsg ? formatTime(conv.lastMsg.created_at) : '';
                var avatarHtml = avatarUrl ? '<img src="' + avatarUrl + '">' : '<div class="initial" style="background:var(--accent);">' + initial + '</div>';
                var selectedClass = (selectedPartner === username) ? ' selected' : '';
                html += '<div class="chat-card' + selectedClass + '" data-partner="' + username + '">'
                    + '<div class="chat-avatar" style="background:var(--surface2);">' + avatarHtml + '</div>'
                    + '<div class="chat-body"><div class="name">' + username + '</div><div class="preview">' + escapeHtml(preview) + '</div></div>'
                    + '<div class="time">' + time + '</div>'
                    + '</div>';
            });
            list.innerHTML = html;
            list.querySelectorAll('.chat-card').forEach(function(card) {
                card.addEventListener('click', function() { openConversation(this.dataset.partner); });
            });
        }

        function openConversation(username) {
            selectedPartner = username;
            renderConversations();
            var conv = conversations[username];
            if (!conv) return;
            var partner = conv.partner;
            var avatarUrl = partner.avatar || null;
            var initial = (partner.username || '?')[0].toUpperCase();
            var avatarHtml = avatarUrl ? '<img src="' + avatarUrl + '" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">' : '<div class="initial" style="width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.7rem;">' + initial + '</div>';
            document.getElementById('chat-partner-name').innerHTML = avatarHtml + ' ' + partner.username;
            var msgsEl = document.getElementById('messages-list');
            msgsEl.innerHTML = conv.messages.sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); }).map(renderMessage).join('');
            document.getElementById('chat-conversation').classList.add('active');
            document.getElementById('composer-row').style.display = 'flex';
            msgsEl.scrollTop = msgsEl.scrollHeight;
        }

        function renderMessage(m) {
            var isSent = m.sender && m.sender.id === currentUser.id;
            var time = new Date(m.created_at).toLocaleString('es-AR', { hour:'2-digit', minute:'2-digit' });
            return '<div class="msg ' + (isSent ? 'sent' : 'received') + '">' + escapeHtml(m.content) + '<div class="msg-time">' + time + '</div></div>';
        }

        async function sendMessage() {
            var input = document.getElementById('msg-input');
            var content = input.value.trim();
            if (!content || !selectedPartner) return;
            var btn = document.getElementById('btn-send-msg');
            btn.disabled = true;
            try {
                var res = await fetchWithAuth('/api/messages/', {
                    method: 'POST',
                    body: JSON.stringify({ receiver: 'dummy', content: content, receiver_username: selectedPartner })
                });
                if (!res || !res.ok) throw new Error();
                var msg = await res.json();
                input.value = '';
                loadMessages();
                setTimeout(function() { openConversation(selectedPartner); }, 300);
            } catch(e) {
                var banner = document.getElementById('error-banner');
                banner.textContent = 'No se pudo enviar el mensaje. Verificá que el usuario exista.';
                banner.style.display = 'block';
                setTimeout(function() { banner.style.display = 'none'; }, 3000);
            } finally { btn.disabled = false; }
        }

        async function sendNewMessage() {
            var username = document.getElementById('compose-username').value.trim();
            var content = document.getElementById('compose-content').value.trim();
            if (!username || !content) return;
            var btn = document.getElementById('compose-send');
            btn.disabled = true;
            try {
                var res = await fetchWithAuth('/api/messages/', {
                    method: 'POST',
                    body: JSON.stringify({ receiver: 'dummy', content: content, receiver_username: username })
                });
                if (!res || !res.ok) throw new Error();
                document.getElementById('compose-modal').classList.remove('open');
                document.getElementById('compose-username').value = '';
                document.getElementById('compose-content').value = '';
                loadMessages();
                setTimeout(function() { openConversation(username); }, 300);
            } catch(e) {
                var banner = document.getElementById('error-banner');
                banner.textContent = 'No se pudo enviar. Verificá que el usuario "' + username + '" exista.';
                banner.style.display = 'block';
                setTimeout(function() { banner.style.display = 'none'; }, 5000);
            } finally { btn.disabled = false; }
        }

        function formatTime(dateStr) {
            if (!dateStr) return '';
            var diff = (Date.now() - new Date(dateStr)) / 1000;
            if (diff < 60) return 'ahora';
            if (diff < 3600) return Math.floor(diff / 60) + 'm';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h';
            return Math.floor(diff / 86400) + 'd';
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token');
            window.location.href = '/api/users/logout/';
        }

        // ── COMPOSE POST MODAL ──
        var selectedImage = null;

        function openComposePost() { document.getElementById('compose-post-modal').classList.add('open'); }

        function closeComposePost() { document.getElementById('compose-post-modal').classList.remove('open'); clearComposePostImage(); }

        function clearComposePostImage() {
            selectedImage = null;
            var inp = document.getElementById('compose-post-image-input');
            if (inp) inp.value = '';
            var prev = document.getElementById('compose-post-image-preview');
            if (prev) prev.style.display = 'none';
        }

        function previewComposePostImage(e) {
            var file = e.target.files[0];
            if (!file) return;
            selectedImage = file;
            var reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('compose-post-image-preview-img').src = ev.target.result;
                document.getElementById('compose-post-image-preview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function updateComposePostCharCount() {
            var input = document.getElementById('compose-post-input');
            var remaining = 280 - input.value.length;
            var counter = document.getElementById('compose-post-char-count');
            counter.textContent = remaining;
            counter.className = 'char-count' + (remaining < 20 ? ' danger' : remaining < 50 ? ' warn' : '');
        }

        function insertComposePostTag(tag) {
            var input = document.getElementById('compose-post-input');
            input.value += tag;
            input.focus();
            updateComposePostCharCount();
        }

        async function createPostFromCompose() {
            var input = document.getElementById('compose-post-input');
            var content = input.value.trim();
            if (!content && !selectedImage) return;
            var btn = document.getElementById('compose-post-btn-trinar');
            btn.disabled = true;
            btn.textContent = '...';
            try {
                var formData = new FormData();
                formData.append('content', content);
                if (selectedImage) formData.append('image', selectedImage);
                var res = await fetchWithAuth('/api/posts/posts/', { method: 'POST', body: formData });
                if (!res || !res.ok) throw new Error();
                input.value = '';
                clearComposePostImage();
                updateComposePostCharCount();
                closeComposePost();
            } catch (e) {
                alert('No se pudo publicar. Intentá de nuevo.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Trinar';
            }
        }

        async function loadSuggestions() {
            try {
                var res = await fetchWithAuth('/api/users/suggestions/');
                if (!res || !res.ok) return;
                var users = await res.json();
                var container = document.getElementById('suggestions-container');
                if (!container) return;
                if (!users || users.length === 0) {
                    container.innerHTML = '<div style="padding:8px;color:var(--muted);font-size:0.85rem;">No hay sugerencias</div>';
                    return;
                }
                container.innerHTML = users.map(function(u) {
                    var initial = (u.username || '?')[0].toUpperCase();
                    var avatarHtml = u.avatar
                        ? '<img src="' + u.avatar + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">'
                        : '<div class="avatar" style="width:32px;height:32px;font-size:0.75rem;">' + initial + '</div>';
                    return '<div class="suggest-user">'
                        + avatarHtml
                        + '<div class="suggest-info">'
                        + '<div class="suggest-name">' + u.username + '</div>'
                        + '<div class="suggest-handle">@' + u.username + '</div>'
                        + '</div>'
                        + '<button class="btn-follow-small" onclick="followUser(\'' + u.username + '\', this)">Seguir</button>'
                        + '</div>';
                }).join('');
            } catch(e) {}
        }

        async function followUser(username, btn) {
            try {
                var res = await fetchWithAuth('/api/users/follow/' + username + '/', { method: 'POST' });
                if (!res || !res.ok) return;
                var data = await res.json();
                btn.textContent = data.status === 'siguiendo' ? 'Siguiendo' : 'Seguir';
                btn.style.background = data.status === 'siguiendo' ? 'var(--accent)' : '';
                btn.style.color = data.status === 'siguiendo' ? '#fff' : '';
            } catch(e) { console.error(e); }
        }

        function handleSearch(e) {
            if (e.key === 'Enter') {
                var q = document.getElementById('search-input').value.trim();
                if (q) window.location.href = '/search/?q=' + encodeURIComponent(q);
            }
        }

        function toggleTheme() {
            var isLight = document.body.getAttribute('data-theme') === 'light';
            document.body.setAttribute('data-theme', isLight ? '' : 'light');
            localStorage.setItem('theme', isLight ? '' : 'light');
            document.getElementById('btn-theme').textContent = isLight ? '🌙' : '☀️';
        }

        function loadTheme() {
            var saved = localStorage.getItem('theme');
            if (saved === 'light') { document.body.setAttribute('data-theme', 'light'); document.getElementById('btn-theme').textContent = '☀️'; }
        }

        document.getElementById('btn-theme').addEventListener('click', toggleTheme);
        document.getElementById('btn-logout').addEventListener('click', logout);
        document.getElementById('user-card').addEventListener('click', function() { window.location.href = '/profile/'; });
        document.getElementById('chat-back-btn').addEventListener('click', function() { document.getElementById('chat-conversation').classList.remove('active'); document.getElementById('composer-row').style.display = 'none'; });
        document.getElementById('btn-send-msg').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('btn-compose').addEventListener('click', function() { document.getElementById('compose-modal').classList.add('open'); });
        document.getElementById('compose-cancel').addEventListener('click', function() { document.getElementById('compose-modal').classList.remove('open'); });
        document.getElementById('compose-send').addEventListener('click', sendNewMessage);
        document.getElementById('compose-content').addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendNewMessage(); } });
        document.getElementById('btn-post').addEventListener('click', openComposePost);
        document.getElementById('compose-post-close').addEventListener('click', closeComposePost);
        document.getElementById('compose-post-modal').addEventListener('click', function(e) { if (e.target === this) closeComposePost(); });
        document.getElementById('compose-post-btn-trinar').addEventListener('click', createPostFromCompose);
        document.getElementById('compose-post-input').addEventListener('input', updateComposePostCharCount);
        document.getElementById('compose-post-image-input').addEventListener('change', previewComposePostImage);
        document.getElementById('compose-post-btn-clear-image').addEventListener('click', clearComposePostImage);
        document.getElementById('compose-post-image-btn').addEventListener('click', function() { document.getElementById('compose-post-image-input').click(); });
        document.getElementById('compose-post-hashtag-btn').addEventListener('click', function() { insertComposePostTag('#'); });
        document.getElementById('compose-post-mention-btn').addEventListener('click', function() { insertComposePostTag('@'); });
        document.getElementById('search-input').addEventListener('keydown', handleSearch);

        loadTheme();
        loadProfile().then(function() { loadMessages(); loadSuggestions(); });
    </script>
</body>
</html>
