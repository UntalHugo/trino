<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trino — Notificaciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0a0a0f; --surface: #111118; --surface2: #16161f; --border: #1e1e2e; --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.2); --text: #e8e8f0; --muted: #5a5a7a; --like: #ff4f6d; --success: #4fffb0; }
        [data-theme="light"] { --bg: #ffffff; --surface: #f5f5f8; --surface2: #e8e8f0; --border: #d0d0da; --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.15); --text: #0a0a0f; --muted: #8a8aaa; --like: #e0455e; --success: #2ea87a; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: grid; grid-template-columns: 260px 1fr 300px; max-width: 1200px; margin: 0 auto; }
        /* ── SIDEBAR IZQUIERDO ── */
        .sidebar-left {
            padding: 1.5rem 1rem;
            border-right: 1px solid var(--border);
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -1px;
        }

        .logo span { color: var(--accent); }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            cursor: pointer;
        }

        .nav-item:hover { background: var(--surface2); }
        .nav-item.active { color: var(--accent); background: rgba(108,99,255,0.08); }

        .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }

        .btn-logout {
            background: none;
            border: 1px solid rgba(255, 79, 109, 0.3);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            color: #ff4f6d;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-logout:hover { background: rgba(255, 79, 109, 0.1); border-color: #ff4f6d; }

        .btn-theme {
            background: none;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-theme:hover { background: var(--surface2); border-color: var(--accent); }

        .user-card {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .user-card:hover { background: var(--surface2); }

        .avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #63b3ff);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.875rem; color: #fff;
            flex-shrink: 0;
        }

        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-size: 0.875rem; font-weight: 600; }
        .user-handle { font-size: 0.75rem; color: var(--muted); }

        .sidebar-right { padding: 1.5rem 1rem; }
        .main-content { padding: 1.5rem 2rem; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .page-header h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .btn-mark-read { background: none; border: 1px solid var(--border); color: var(--accent); padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; transition: all 0.15s; }
        .btn-mark-read:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .notif-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: all 0.15s; }
        .notif-card:hover { border-color: var(--accent); }
        .notif-card.unread { border-left: 3px solid var(--accent); background: var(--surface2); }
        .notif-icon { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .notif-icon img { width: 100%; height: 100%; object-fit: cover; }
        .notif-icon .initial { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 0.9rem; }
        .notif-body { flex: 1; min-width: 0; }
        .notif-body p { font-size: 0.88rem; line-height: 1.4; color: var(--muted); }
        .notif-body p strong { color: var(--text); font-weight: 600; }
        .notif-body .time { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
        .empty-state svg { width: 60px; height: 60px; opacity: 0.3; margin-bottom: 1rem; }
        .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 1.3rem; color: var(--text); margin-bottom: 0.5rem; }
        .loading { text-align: center; padding: 3rem; color: var(--muted); }
        .error-banner { background: rgba(255,79,109,0.1); border: 1px solid rgba(255,79,109,0.2); border-radius: 10px; padding: 0.8rem 1rem; color: var(--like); font-size: 0.85rem; margin-bottom: 1rem; display: none; }

        /* ── RIGHT SIDEBAR WIDGETS ── */
        .search-box { position: relative; margin-bottom: 1.5rem; }
        .search-box input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 0.65rem 1rem 0.65rem 2.25rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.875rem; outline: none; transition: border-color 0.2s; }
        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: var(--muted); }
        .search-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; }
        .widget { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
        .widget h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 1rem; }
        .suggest-user { display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0; }
        .suggest-info { flex: 1; }
        .suggest-name { font-size: 0.875rem; font-weight: 600; }
        .suggest-handle { font-size: 0.75rem; color: var(--muted); }
        .btn-follow-small { background: none; border: 1px solid var(--accent); border-radius: 20px; padding: 0.3rem 0.85rem; color: var(--accent); font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: background 0.15s, color 0.15s; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
        .btn-follow-small:hover { background: var(--accent); color: #fff; }

        /* ── COMPOSE MODAL ── */
        .compose-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200; justify-content: center; align-items: center; }
        .compose-modal-overlay.open { display: flex; }
        .compose-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 520px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .compose-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
        .compose-modal-header h3 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
        .compose-modal-close { background: none; border: none; color: var(--muted); font-size: 1.25rem; cursor: pointer; padding: 0.25rem; border-radius: 6px; transition: color 0.15s; }
        .compose-modal-close:hover { color: var(--text); }
        .compose-modal-body { padding: 1.25rem; }
        .compose-modal-composer { display: flex; gap: 0.75rem; }
        .compose-modal-input-wrap { flex: 1; }
        .compose-modal-input-wrap textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; resize: none; min-height: 80px; }
        .compose-modal-input-wrap textarea::placeholder { color: var(--muted); }
        .compose-modal-actions { display: flex; align-items: center; justify-content: space-between; padding-top: 0.75rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
        .compose-modal-tools { display: flex; gap: 0.5rem; }

        .btn-post {
            margin-top: 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.85rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px var(--accent-glow);
            width: 100%;
        }

        .btn-post:hover { opacity: 0.9; box-shadow: 0 6px 24px rgba(108,99,255,0.35); }

        @media (max-width: 1024px) {
            body { grid-template-columns: 70px 1fr; }
            .sidebar-right { display: none; }
            .nav-item span:not(.nav-icon) { display: none; }
            .logo span { display: none; }
            .btn-post { padding: 0.85rem; font-size: 0; }
            .btn-post::before { content: '✏️'; font-size: 1.1rem; }
            .user-card .user-info { display: none; }
        }
        @media (max-width: 640px) {
            body { grid-template-columns: 1fr; }
            .sidebar-left { display: none; }
        }
    </style>
</head>
<body>
    <nav class="sidebar-left">
        <div class="logo">🐦 <span>Trino</span></div>

        <a class="nav-item" href="/feed/">
            <span class="nav-icon">🏠</span> Inicio
        </a>
        <a class="nav-item" href="/search/" id="nav-explore">
            <span class="nav-icon">🔍</span> Explorar
        </a>
        <a class="nav-item active" href="/notifications/" id="nav-notifs">
            <span class="nav-icon">🔔</span> Notificaciones
        </a>
        <a class="nav-item" href="/messages/" id="nav-messages">
            <span class="nav-icon">✉️</span> Mensajes
        </a>
        <a class="nav-item" href="/profile/" id="nav-profile">
            <span class="nav-icon">👤</span> Perfil
        </a>

        <button class="btn-post" id="btn-post">
            Trinar
        </button>

        <button class="btn-logout" id="btn-logout">
            🚪 Cerrar sesión
        </button>

        <button class="btn-theme" id="btn-theme" title="Cambiar tema">
            🌙
        </button>

        <div class="user-card" id="user-card">
            <div class="avatar" id="user-avatar">?</div>
            <div class="user-info">
                <div class="user-name" id="user-name">Cargando...</div>
                <div class="user-handle" id="user-handle">@...</div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1>Notificaciones</h1>
            <button class="btn-mark-read" id="btn-mark-read">✓ Marcar todas como leídas</button>
        </div>
        <div class="error-banner" id="error-banner"></div>
        <div id="notifications-list"><div class="loading">Cargando notificaciones...</div></div>
    </main>

    <aside class="sidebar-right">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Buscar en Trino" id="search-input">
        </div>
        <div class="widget">
            <h3>A quién seguir</h3>
            <div id="suggestions-container"></div>
        </div>
    </aside>

    <!-- COMPOSE MODAL -->
    <div class="compose-modal-overlay" id="compose-modal">
        <div class="compose-modal">
            <div class="compose-modal-header">
                <h3>Crear publicación</h3>
                <button class="compose-modal-close" id="compose-modal-close">✕</button>
            </div>
            <div class="compose-modal-body">
                <div class="compose-modal-composer">
                    <div class="avatar" id="compose-modal-avatar">?</div>
                    <div class="compose-modal-input-wrap">
                        <textarea id="compose-modal-input" placeholder="¿Qué está pasando?" maxlength="280" rows="3"></textarea>
                        <div class="compose-modal-actions">
                            <div class="compose-modal-tools">
                                <button class="tool-btn" id="compose-modal-image-btn" title="Imagen">🖼️</button>
                                <button class="tool-btn" id="compose-modal-hashtag-btn" title="Hashtag">＃</button>
                                <button class="tool-btn" id="compose-modal-mention-btn" title="Mencionar">@</button>
                            </div>
                            <div style="display:flex;align-items:center;">
                                <span class="char-count" id="compose-modal-char-count">280</span>
                                <button class="btn-trinar" id="compose-modal-btn-trinar">Trinar</button>
                            </div>
                        </div>
                        <input type="file" id="compose-modal-image-input" accept="image/*" style="display:none">
                        <div id="compose-modal-image-preview" style="display:none;position:relative;margin-top:0.5rem;">
                            <img id="compose-modal-image-preview-img" style="max-height:200px;border-radius:12px;border:1px solid var(--border);width:100%;object-fit:cover;">
                            <button id="compose-modal-btn-clear-image" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);border:none;border-radius:50%;width:28px;height:28px;color:#fff;cursor:pointer;font-size:0.9rem;">✕</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let accessToken = localStorage.getItem('access_token') || '';
        let currentUser = null;

        async function fetchWithAuth(url, options) {
            if (!accessToken) { window.location.href = '/accounts/login/'; return null; }
            options = options || {};
            options.headers = options.headers || {};
            options.headers['Authorization'] = 'Bearer ' + accessToken;
            if (!(options.body instanceof FormData)) { options.headers['Content-Type'] = 'application/json'; }
            let res = await fetch(url, options);
            if (res.status === 401) {
                var rt = localStorage.getItem('refresh_token');
                if (rt) {
                    try {
                        var rr = await fetch('/api/auth/refresh/', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({refresh:rt}) });
                        var rd = await rr.json();
                        if (rd.access) {
                            localStorage.setItem('access_token', rd.access);
                            accessToken = rd.access;
                            options.headers['Authorization'] = 'Bearer ' + accessToken;
                            res = await fetch(url, options);
                        }
                    } catch(e) {}
                }
                if (res.status === 401) { localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token'); window.location.href = '/accounts/login/'; return null; }
            }
            return res;
        }

        async function loadProfile() {
            try {
                var res = await fetchWithAuth('/api/users/profile/');
                if (!res || !res.ok) return;
                currentUser = await res.json();
                var initial = (currentUser.username || '?')[0].toUpperCase();
                var avatarEl = document.getElementById('user-avatar');
                if (currentUser.avatar) { avatarEl.innerHTML = '<img src="' + currentUser.avatar + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">'; }
                else { avatarEl.textContent = initial; }
                document.getElementById('user-name').textContent = currentUser.first_name || currentUser.username;
                document.getElementById('user-handle').textContent = '@' + currentUser.username;
            } catch(e) { console.error(e); }
        }

        async function loadNotifications() {
            var list = document.getElementById('notifications-list');
            try {
                var res = await fetchWithAuth('/api/notifications/');
                if (!res || !res.ok) { list.innerHTML = '<div class="empty-state"><h2>Error al cargar</h2><p>Intentá de nuevo más tarde.</p></div>'; return; }
                var data = await res.json();
                var notifs = data.results || data;
                if (!notifs || notifs.length === 0) {
                    list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><h2>Sin notificaciones</h2><p>Cuando alguien interactúe con tu contenido, lo verás acá.</p></div>';
                    document.getElementById('btn-mark-read').style.display = 'none';
                    return;
                }
                list.innerHTML = notifs.map(renderNotif).join('');
                var hasUnread = notifs.some(function(n) { return !n.read; });
                document.getElementById('btn-mark-read').style.display = hasUnread ? 'inline-block' : 'none';
            } catch(e) {
                list.innerHTML = '<div class="empty-state"><h2>Error de conexión</h2></div>';
            }
        }

        function renderNotif(n) {
            var actor = n.actor || {};
            var username = actor.username || 'usuario';
            var avatarUrl = actor.avatar || null;
            var initial = username[0].toUpperCase();
            var time = formatTime(n.created_at);
            var icon, text;
            switch(n.notification_type) {
                case 'like': icon = '❤️'; text = 'le gustó tu publicación'; break;
                case 'comment': icon = '💬'; text = 'comentó tu publicación'; break;
                case 'follow': icon = '👤'; text = 'comenzó a seguirte'; break;
                case 'mention': icon = '@'; text = 'te mencionó en una publicación'; break;
                default: icon = '🔔'; text = 'interactuó con tu contenido';
            }
            var displayName = actor.first_name || username;
            var avatarHtml = avatarUrl ? '<img src="' + avatarUrl + '">' : '<div class="initial" style="background:var(--accent);">' + initial + '</div>';
            var unreadClass = n.read ? '' : ' unread';
            return '<div class="notif-card' + unreadClass + '" onclick="goToNotif(\'' + n.notification_type + '\', \'' + username + '\')">'
                + '<div class="notif-icon" style="background:var(--surface2);">' + avatarHtml + '</div>'
                + '<div class="notif-body"><p><strong>' + displayName + '</strong> ' + text + '</p><div class="time">' + time + '</div></div>'
                + '</div>';
        }

        function goToNotif(type, username) {
            if (type === 'follow') { window.location.href = '/profile/?username=' + encodeURIComponent(username); }
            else { window.location.href = '/feed/'; }
        }

        async function markAllRead() {
            try {
                var res = await fetchWithAuth('/api/notifications/read/', { method: 'POST' });
                if (!res || !res.ok) return;
                document.querySelectorAll('.notif-card.unread').forEach(function(el) { el.classList.remove('unread'); });
                document.getElementById('btn-mark-read').style.display = 'none';
            } catch(e) {}
        }

        function formatTime(dateStr) {
            if (!dateStr) return '';
            var diff = (Date.now() - new Date(dateStr)) / 1000;
            if (diff < 60) return 'ahora';
            if (diff < 3600) return Math.floor(diff / 60) + 'm';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd';
            return new Date(dateStr).toLocaleDateString('es-AR', { day:'numeric', month:'short' });
        }

        function logout() {
            localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token');
            window.location.href = '/api/users/logout/';
        }

        // ── COMPOSE MODAL ──
        let selectedImage = null;

        function openComposeModal() { document.getElementById('compose-modal').classList.add('open'); }

        function closeComposeModal() { document.getElementById('compose-modal').classList.remove('open'); clearComposeImage(); }

        function clearComposeImage() {
            selectedImage = null;
            var inp = document.getElementById('compose-modal-image-input');
            if (inp) inp.value = '';
            var prev = document.getElementById('compose-modal-image-preview');
            if (prev) prev.style.display = 'none';
        }

        function previewComposeImage(e) {
            var file = e.target.files[0];
            if (!file) return;
            selectedImage = file;
            var reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('compose-modal-image-preview-img').src = ev.target.result;
                document.getElementById('compose-modal-image-preview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function updateComposeCharCount() {
            var input = document.getElementById('compose-modal-input');
            var remaining = 280 - input.value.length;
            var counter = document.getElementById('compose-modal-char-count');
            counter.textContent = remaining;
            counter.className = 'char-count' + (remaining < 20 ? ' danger' : remaining < 50 ? ' warn' : '');
        }

        function insertComposeTag(tag) {
            var input = document.getElementById('compose-modal-input');
            input.value += tag;
            input.focus();
            updateComposeCharCount();
        }

        async function createPostFromModal() {
            var input = document.getElementById('compose-modal-input');
            var content = input.value.trim();
            if (!content && !selectedImage) return;
            var btn = document.getElementById('compose-modal-btn-trinar');
            btn.disabled = true;
            btn.textContent = '...';
            try {
                var formData = new FormData();
                formData.append('content', content);
                if (selectedImage) formData.append('image', selectedImage);
                var res = await fetchWithAuth('/api/posts/posts/', { method: 'POST', body: formData });
                if (!res || !res.ok) throw new Error();
                input.value = '';
                clearComposeImage();
                updateComposeCharCount();
                closeComposeModal();
            } catch (e) {
                alert('No se pudo publicar. Intentá de nuevo.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Trinar';
            }
        }

        async function loadSuggestions() {
            try {
                var res = await fetchWithAuth('/api/users/suggestions/');
                if (!res || !res.ok) return;
                var users = await res.json();
                var container = document.getElementById('suggestions-container');
                if (!container) return;
                if (!users || users.length === 0) {
                    container.innerHTML = '<div style="padding:8px;color:var(--muted);font-size:0.85rem;">No hay sugerencias</div>';
                    return;
                }
                container.innerHTML = users.map(function(u) {
                    var initial = (u.username || '?')[0].toUpperCase();
                    var avatarHtml = u.avatar
                        ? '<img src="' + u.avatar + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">'
                        : '<div class="avatar" style="width:32px;height:32px;font-size:0.75rem;">' + initial + '</div>';
                    return '<div class="suggest-user">'
                        + avatarHtml
                        + '<div class="suggest-info">'
                        + '<div class="suggest-name">' + (u.first_name || u.username) + '</div>'
                        + '<div class="suggest-handle">@' + u.username + '</div>'
                        + '</div>'
                        + '<button class="btn-follow-small" onclick="followUser(\'' + u.username + '\', this)">Seguir</button>'
                        + '</div>';
                }).join('');
            } catch(e) {}
        }

        async function followUser(username, btn) {
            try {
                var res = await fetchWithAuth('/api/users/follow/' + username + '/', { method: 'POST' });
                if (!res || !res.ok) return;
                var data = await res.json();
                btn.textContent = data.status === 'siguiendo' ? 'Siguiendo' : 'Seguir';
                btn.style.background = data.status === 'siguiendo' ? 'var(--accent)' : '';
                btn.style.color = data.status === 'siguiendo' ? '#fff' : '';
            } catch(e) { console.error(e); }
        }

        function handleSearch(e) {
            if (e.key === 'Enter') {
                var q = document.getElementById('search-input').value.trim();
                if (q) window.location.href = '/search/?q=' + encodeURIComponent(q);
            }
        }

        function toggleTheme() {
            var isLight = document.body.getAttribute('data-theme') === 'light';
            document.body.setAttribute('data-theme', isLight ? '' : 'light');
            localStorage.setItem('theme', isLight ? '' : 'light');
            document.getElementById('btn-theme').textContent = isLight ? '🌙' : '☀️';
        }

        function loadTheme() {
            var saved = localStorage.getItem('theme');
            if (saved === 'light') { document.body.setAttribute('data-theme', 'light'); document.getElementById('btn-theme').textContent = '☀️'; }
        }

        document.getElementById('btn-theme').addEventListener('click', toggleTheme);
        document.getElementById('btn-logout').addEventListener('click', logout);
        document.getElementById('user-card').addEventListener('click', function() { window.location.href = '/profile/'; });
        document.getElementById('btn-mark-read').addEventListener('click', markAllRead);
        document.getElementById('btn-post').addEventListener('click', openComposeModal);
        document.getElementById('compose-modal-close').addEventListener('click', closeComposeModal);
        document.getElementById('compose-modal').addEventListener('click', function(e) { if (e.target === this) closeComposeModal(); });
        document.getElementById('compose-modal-btn-trinar').addEventListener('click', createPostFromModal);
        document.getElementById('compose-modal-input').addEventListener('input', updateComposeCharCount);
        document.getElementById('compose-modal-image-input').addEventListener('change', previewComposeImage);
        document.getElementById('compose-modal-btn-clear-image').addEventListener('click', clearComposeImage);
        document.getElementById('compose-modal-image-btn').addEventListener('click', function() { document.getElementById('compose-modal-image-input').click(); });
        document.getElementById('compose-modal-hashtag-btn').addEventListener('click', function() { insertComposeTag('#'); });
        document.getElementById('compose-modal-mention-btn').addEventListener('click', function() { insertComposeTag('@'); });
        document.getElementById('search-input').addEventListener('keydown', handleSearch);

        loadTheme();
        loadProfile().then(function() { loadNotifications(); loadSuggestions(); });
    </script>
</body>
</html>
