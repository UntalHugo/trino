<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trino — Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #16161f;
            --border: #1e1e2e;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.2);
            --text: #e8e8f0;
            --muted: #5a5a7a;
            --like: #ff4f6d;
            --success: #4fffb0;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --surface: #f5f5f8;
            --surface2: #e8e8f0;
            --border: #d0d0da;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --text: #0a0a0f;
            --muted: #8a8aaa;
            --like: #e0455e;
            --success: #2ea87a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 260px 1fr 300px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── SIDEBAR IZQUIERDO ── */
        .sidebar-left {
            padding: 1.5rem 1rem;
            border-right: 1px solid var(--border);
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -1px;
        }

        .logo span { color: var(--accent); }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            cursor: pointer;
        }

        .nav-item:hover { background: var(--surface2); }
        .nav-item.active { color: var(--accent); background: rgba(108,99,255,0.08); }

        .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }

        .btn-post {
            margin-top: 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.85rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px var(--accent-glow);
            width: 100%;
        }

        .btn-post:hover { opacity: 0.9; box-shadow: 0 6px 24px rgba(108,99,255,0.35); }

        .btn-logout {
            background: none;
            border: 1px solid rgba(255, 79, 109, 0.3);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            color: #ff4f6d;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-logout:hover { background: rgba(255, 79, 109, 0.1); border-color: #ff4f6d; }

        .btn-theme {
            background: none;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-theme:hover { background: var(--surface2); border-color: var(--accent); }

        .user-card {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .user-card:hover { background: var(--surface2); }

        .avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #63b3ff);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.875rem; color: #fff;
            flex-shrink: 0;
        }

        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-size: 0.875rem; font-weight: 600; }
        .user-handle { font-size: 0.75rem; color: var(--muted); }

        /* ── FEED CENTRAL ── */
        .feed {
            border-right: 1px solid var(--border);
            min-height: 100vh;
        }

        .feed-header {
            position: sticky;
            top: 0;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.25rem;
            z-index: 10;
        }

        .feed-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Composer */
        .composer {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
        }

        .composer-input-wrap { flex: 1; }

        #post-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            resize: none;
            min-height: 60px;
            placeholder-color: var(--muted);
        }

        #post-input::placeholder { color: var(--muted); }

        .composer-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: 0.5rem;
        }

        .composer-tools { display: flex; gap: 0.5rem; }

        .tool-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1rem;
            cursor: pointer;
            padding: 0.35rem 0.5rem;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .tool-btn:hover { background: rgba(108,99,255,0.1); }

        .char-count {
            font-size: 0.75rem;
            color: var(--muted);
            margin-right: 0.75rem;
        }

        .char-count.warn { color: #ffa94d; }
        .char-count.danger { color: var(--like); }

        .btn-trinar {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 0.5rem 1.25rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-trinar:hover { opacity: 0.85; }
        .btn-trinar:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Posts */
        .post {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.85rem;
            transition: background 0.15s;
            cursor: pointer;
        }

        .post:hover { background: rgba(255,255,255,0.015); }

        .post-body { flex: 1; }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .post-author {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .post-handle, .post-time {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .post-content {
            font-size: 0.95rem;
            line-height: 1.55;
            margin-bottom: 0.75rem;
            color: var(--text);
        }

        .post-content .hashtag { color: var(--accent); }
        .post-content .mention { color: #63b3ff; }

        .post-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            max-height: 280px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .post-actions {
            display: flex;
            gap: 1.5rem;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background: none;
            border: none;
            color: var(--muted);
            font-size: 0.825rem;
            cursor: pointer;
            padding: 0.25rem 0;
            transition: color 0.15s;
            font-family: 'DM Sans', sans-serif;
        }

        .action-btn:hover { color: var(--accent); }
        .action-btn.liked { color: var(--like); }
        .action-btn.liked:hover { color: var(--like); }
        .action-btn span { font-size: 1rem; }

        /* Loading skeleton */
        .skeleton-post {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.85rem;
        }

        .skel {
            background: var(--surface2);
            border-radius: 6px;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .skel-avatar { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; }
        .skel-body { flex: 1; }
        .skel-line { height: 12px; margin-bottom: 8px; }
        .skel-line.w-40 { width: 40%; }
        .skel-line.w-80 { width: 80%; }
        .skel-line.w-60 { width: 60%; }

        /* Empty state */
        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--muted);
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
        .empty-state h3 { font-family: 'Syne', sans-serif; color: var(--text); margin-bottom: 0.5rem; }

        /* Error banner */
        .error-banner {
            background: rgba(255,79,109,0.08);
            border: 1px solid rgba(255,79,109,0.2);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #ff4f6d;
            font-size: 0.825rem;
            margin: 1rem 1.25rem;
            display: none;
        }

        /* ── SIDEBAR DERECHO ── */
        .sidebar-right {
            padding: 1.5rem 1rem;
        }

        .search-box {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .search-box input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.65rem 1rem 0.65rem 2.25rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: var(--muted); }

        .search-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.9rem;
        }

        .widget {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .widget h3 {
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .trend-item {
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .trend-item:last-child { border-bottom: none; }

        .trend-tag {
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--accent);
        }

        .trend-count {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.1rem;
        }

        .suggest-user {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.6rem 0;
        }

        .suggest-info { flex: 1; }
        .suggest-name { font-size: 0.875rem; font-weight: 600; }
        .suggest-handle { font-size: 0.75rem; color: var(--muted); }

        .btn-follow-small {
            background: none;
            border: 1px solid var(--accent);
            border-radius: 20px;
            padding: 0.3rem 0.85rem;
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-follow-small:hover { background: var(--accent); color: #fff; }

        /* ── COMMENTS MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 500px;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 6px;
            transition: color 0.15s;
        }

        .modal-close:hover { color: var(--text); }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .comment-item {
            display: flex;
            gap: 0.75rem;
            padding: 0.85rem 1.25rem;
        }

        .comment-body { flex: 1; }
        .comment-meta { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.2rem; }
        .comment-author { font-weight: 600; font-size: 0.85rem; }
        .comment-time { font-size: 0.75rem; color: var(--muted); }
        .comment-text { font-size: 0.9rem; line-height: 1.5; color: var(--text); }

        .comments-empty {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--muted);
        }

        .comments-empty .icon { font-size: 2rem; display: block; margin-bottom: 0.75rem; }

        .modal-composer {
            display: flex;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
        }

        .modal-composer input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.65rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-composer input:focus { border-color: var(--accent); }
        .modal-composer input::placeholder { color: var(--muted); }

        .btn-comment {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 0.5rem 1.25rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .btn-comment:hover { opacity: 0.85; }
        .btn-comment:disabled { opacity: 0.4; cursor: not-allowed; }

        .comment-loading {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }

        @media (max-width: 1024px) {
            body { grid-template-columns: 70px 1fr; }
            .sidebar-right { display: none; }
            .nav-item span:not(.nav-icon) { display: none; }
            .logo span:last-child { display: none; }
            .btn-post { padding: 0.85rem; font-size: 0; }
            .btn-post::before { content: '✏️'; font-size: 1.1rem; }
            .user-card .user-info { display: none; }
        }

        @media (max-width: 640px) {
            body { grid-template-columns: 1fr; }
            .sidebar-left { display: none; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR IZQUIERDO -->
<nav class="sidebar-left">
    <div class="logo">🐦 <span>Trino</span></div>

    <a class="nav-item active" href="/feed/">
        <span class="nav-icon">🏠</span> Inicio
    </a>
    <a class="nav-item" href="/search/" id="nav-explore">
        <span class="nav-icon">🔍</span> Explorar
    </a>
    <a class="nav-item" href="/api/notifications/" id="nav-notifs">
        <span class="nav-icon">🔔</span> Notificaciones
    </a>
    <a class="nav-item" href="/api/messages/" id="nav-messages">
        <span class="nav-icon">✉️</span> Mensajes
    </a>
    <a class="nav-item" href="/profile/" id="nav-profile">
        <span class="nav-icon">👤</span> Perfil
    </a>

    <button class="btn-post" onclick="document.getElementById('post-input').focus()">
        Trinar
    </button>

    <button class="btn-logout" onclick="logout()">
        🚪 Cerrar sesión
    </button>

    <button class="btn-theme" onclick="toggleTheme()" id="btn-theme" title="Cambiar tema">
        🌙
    </button>

    <div class="user-card" id="user-card" onclick="window.location.href='/profile/'">
        <div class="avatar" id="user-avatar">?</div>
        <div class="user-info">
            <div class="user-name" id="user-name">Cargando...</div>
            <div class="user-handle" id="user-handle">@...</div>
        </div>
    </div>
</nav>

<!-- FEED CENTRAL -->
<main class="feed">
    <div class="feed-header">
        <h2>Inicio</h2>
    </div>

    <!-- Compositor -->
    <div class="composer">
        <div class="avatar" id="composer-avatar">?</div>
        <div class="composer-input-wrap">
            <textarea id="post-input" placeholder="¿Qué está pasando?" maxlength="280" rows="2"></textarea>
            <div class="composer-actions">
                <div class="composer-tools">
                    <button class="tool-btn" title="Imagen" onclick="document.getElementById('image-input').click()">🖼️</button>
                    <button class="tool-btn" title="Hashtag" onclick="insertTag('#')">＃</button>
                    <button class="tool-btn" title="Mencionar" onclick="insertTag('@')">@</button>
                </div>
                <div style="display:flex;align-items:center;">
                    <span class="char-count" id="char-count">280</span>
                    <button class="btn-trinar" id="btn-trinar" onclick="createPost()">Trinar</button>
                </div>
            </div>
            <input type="file" id="image-input" accept="image/*" style="display:none" onchange="previewImage(event)">
            <div id="image-preview" style="display:none;position:relative;margin-top:0.5rem;">
                <img id="image-preview-img" style="max-height:200px;border-radius:12px;border:1px solid var(--border);width:100%;object-fit:cover;">
                <button onclick="clearImage()" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);border:none;border-radius:50%;width:28px;height:28px;color:#fff;cursor:pointer;font-size:0.9rem;">✕</button>
            </div>
        </div>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <!-- Posts -->
    <div id="posts-container">
        <!-- Skeletons mientras carga -->
        <div class="skeleton-post">
            <div class="skel skel-avatar"></div>
            <div class="skel-body">
                <div class="skel skel-line w-40"></div>
                <div class="skel skel-line w-80"></div>
                <div class="skel skel-line w-60"></div>
            </div>
        </div>
        <div class="skeleton-post">
            <div class="skel skel-avatar"></div>
            <div class="skel-body">
                <div class="skel skel-line w-40"></div>
                <div class="skel skel-line w-80"></div>
                <div class="skel skel-line w-60"></div>
            </div>
        </div>
        <div class="skeleton-post">
            <div class="skel skel-avatar"></div>
            <div class="skel-body">
                <div class="skel skel-line w-40"></div>
                <div class="skel skel-line w-80"></div>
            </div>
        </div>
    </div>
</main>

<!-- SIDEBAR DERECHO -->
<aside class="sidebar-right">
    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Buscar en Trino" id="search-input" onkeydown="handleSearch(event)">
    </div>

    <div class="widget">
        <h3>A quién seguir</h3>
        <div id="suggestions-container">
            <div class="suggest-user">
                <div class="avatar" style="width:32px;height:32px;font-size:0.75rem;">T</div>
                <div class="suggest-info">
                    <div class="suggest-name">Tobias</div>
                    <div class="suggest-handle">@Tobydou21</div>
                </div>
                <button class="btn-follow-small" onclick="followUser('Tobydou21', this)">Seguir</button>
            </div>
        </div>
    </div>
</aside>

<!-- COMMENTS MODAL -->
<div class="modal-overlay" id="comments-modal" onclick="closeComments(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3>Comentarios</h3>
            <button class="modal-close" onclick="closeComments()">✕</button>
        </div>
        <div class="comments-list" id="comments-list">
            <div class="comment-loading">Cargando comentarios...</div>
        </div>
        <div class="modal-composer">
            <input type="text" id="comment-input" placeholder="Escribí un comentario..." maxlength="280" onkeydown="if(event.key==='Enter'){submitComment()}">
            <button class="btn-comment" id="btn-comment" onclick="submitComment()">Responder</button>
        </div>
    </div>
</div>

<script>
    const API = '';
    let accessToken = localStorage.getItem('access_token') || '';
    let currentUser = null;

    // ── AUTH ──
    async function fetchWithAuth(url, options = {}) {
        if (!accessToken) { logoutAndRedirect(); return null; }

        options.headers = {
            ...options.headers,
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${accessToken}`
        };

        let res = await fetch(url, options);

        if (res.status === 401) {
            const refreshToken = localStorage.getItem('refresh_token');
            if (refreshToken) {
                try {
                    const refreshRes = await fetch('/api/auth/refresh/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refresh: refreshToken })
                    });
                    if (refreshRes.ok) {
                        const data = await refreshRes.json();
                        accessToken = data.access;
                        localStorage.setItem('access_token', accessToken);

                        options.headers['Authorization'] = `Bearer ${accessToken}`;
                        res = await fetch(url, options);
                    } else {
                        logoutAndRedirect();
                    }
                } catch (e) {
                    logoutAndRedirect();
                }
            } else {
                logoutAndRedirect();
            }
        }
        return res;
    }

    async function fetchWithAuthMultipart(url, options = {}) {
        if (!accessToken) { logoutAndRedirect(); return null; }

        options.headers = {
            ...options.headers,
            'Authorization': `Bearer ${accessToken}`
        };

        let res = await fetch(url, options);

        if (res.status === 401) {
            const refreshToken = localStorage.getItem('refresh_token');
            if (refreshToken) {
                try {
                    const refreshRes = await fetch('/api/auth/refresh/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refresh: refreshToken })
                    });
                    if (refreshRes.ok) {
                        const data = await refreshRes.json();
                        accessToken = data.access;
                        localStorage.setItem('access_token', accessToken);
                        options.headers['Authorization'] = `Bearer ${accessToken}`;
                        res = await fetch(url, options);
                    } else {
                        logoutAndRedirect();
                    }
                } catch (e) {
                    logoutAndRedirect();
                }
            } else {
                logoutAndRedirect();
            }
        }
        return res;
    }

    function logoutAndRedirect() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        window.location.href = '/accounts/login/';
    }

    async function getSessionToken() {
        try {
            const res = await fetch('/api/users/session-token/');
            if (res.ok) {
                const data = await res.json();
                accessToken = data.access;
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);
                return true;
            }
        } catch (e) {
            console.error('Error al obtener token de sesión:', e);
        }
        return false;
    }

    async function loadProfile() {
        if (!accessToken) {
            const tokenObtained = await getSessionToken();
            if (!tokenObtained) {
                window.location.href = '/accounts/login/';
                return;
            }
        }
        try {
            const res = await fetchWithAuth('/api/users/profile/');
            if (!res || !res.ok) return;
            currentUser = await res.json();
            const initial = (currentUser.username || '?')[0].toUpperCase();
            if (currentUser.avatar) {
                document.getElementById('user-avatar').innerHTML = `<img src="${currentUser.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                document.getElementById('composer-avatar').innerHTML = `<img src="${currentUser.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
            } else {
                document.getElementById('user-avatar').textContent = initial;
                document.getElementById('composer-avatar').textContent = initial;
            }
            document.getElementById('user-name').textContent = currentUser.username;
            document.getElementById('user-handle').textContent = '@' + currentUser.username;
        } catch (e) { console.error('Error cargando perfil:', e); }
    }

    // ── POSTS ──
    async function loadFeed() {
        try {
            const res = await fetchWithAuth('/api/posts/posts/');
            if (!res || !res.ok) throw new Error('Error al cargar el feed');
            const data = await res.json();
            const posts = data.results || data;
            renderPosts(posts);
        } catch (e) {
            showError('No se pudo cargar el feed. Intentá de nuevo.');
            document.getElementById('posts-container').innerHTML = `
                <div class="empty-state">
                    <span class="icon">🐦</span>
                    <h3>Tu feed está vacío</h3>
                    <p>Seguí a alguien para ver sus publicaciones acá.</p>
                </div>`;
        }
    }

    function renderPosts(posts) {
        const container = document.getElementById('posts-container');
        if (!posts || posts.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <span class="icon">🐦</span>
                    <h3>Tu feed está vacío</h3>
                    <p>Seguí a alguien para ver sus publicaciones acá.</p>
                </div>`;
            return;
        }
        container.innerHTML = posts.map(post => renderPost(post)).join('');
    }

    function renderPost(post) {
        const author = post.author || post.user || {};
        const username = author.username || 'usuario';
        const avatarUrl = author.avatar || null;
        const initial = username[0].toUpperCase();
        const content = formatContent(post.content || '');
        const time = formatTime(post.created_at);
        const likes = post.likes_count || 0;
        const comments = post.comments_count || 0;
        const imageHtml = post.image ? `<img src="${post.image}" class="post-image" alt="imagen">` : '';
        const avatarHtml = avatarUrl
            ? `<img src="${avatarUrl}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;">`
            : `<div class="avatar">${initial}</div>`;

        return `
        <div class="post" data-id="${post.id}" onclick="goToPost(${post.id})">
            ${avatarHtml}
            <div class="post-body">
                <div class="post-meta">
                    <span class="post-author">${username}</span>
                    <span class="post-handle">@${username}</span>
                    <span class="post-handle">·</span>
                    <span class="post-time">${time}</span>
                </div>
                <div class="post-content">${content}</div>
                ${imageHtml}
                <div class="post-actions" onclick="event.stopPropagation()">
                    <button class="action-btn" onclick="toggleLike(${post.id}, this)">
                        <span>🤍</span> ${likes}
                    </button>
                    <button class="action-btn" onclick="viewComments(${post.id})">
                        <span>💬</span> ${comments}
                    </button>
                </div>
            </div>
        </div>`;
    }

    function formatContent(text) {
        return text
            .replace(/#(\w+)/g, '<span class="hashtag">#$1</span>')
            .replace(/@(\w+)/g, '<span class="mention">@$1</span>');
    }

    function formatTime(dateStr) {
        if (!dateStr) return '';
        const diff = (Date.now() - new Date(dateStr)) / 1000;
        if (diff < 60) return 'ahora';
        if (diff < 3600) return Math.floor(diff / 60) + 'm';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h';
        return Math.floor(diff / 86400) + 'd';
    }

    // ── CREAR POST ──
    let selectedImage = null;

    function previewImage(e) {
        const file = e.target.files[0];
        if (!file) return;
        selectedImage = file;
        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('image-preview-img').src = ev.target.result;
            document.getElementById('image-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearImage() {
        selectedImage = null;
        document.getElementById('image-input').value = '';
        document.getElementById('image-preview').style.display = 'none';
    }

    async function createPost() {
        const input = document.getElementById('post-input');
        const content = input.value.trim();
        if (!content && !selectedImage) return;

        const btn = document.getElementById('btn-trinar');
        btn.disabled = true;
        btn.textContent = '...';

        try {
            const formData = new FormData();
            formData.append('content', content);
            if (selectedImage) {
                formData.append('image', selectedImage);
            }

            const res = await fetchWithAuthMultipart('/api/posts/posts/', {
                method: 'POST',
                body: formData
            });
            if (!res || !res.ok) throw new Error('Error al publicar');
            const post = await res.json();
            input.value = '';
            clearImage();
            updateCharCount();
            prependPost(post);
        } catch (e) {
            showError('No se pudo publicar. Intentá de nuevo.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Trinar';
        }
    }

    function prependPost(post) {
        const container = document.getElementById('posts-container');
        const emptyState = container.querySelector('.empty-state');
        if (emptyState) container.innerHTML = '';
        container.insertAdjacentHTML('afterbegin', renderPost(post));
    }

    // ── LIKE ──
    async function toggleLike(postId, btn) {
        try {
            const res = await fetchWithAuth(`/api/posts/${postId}/like/`, { method: 'POST' });
            if (!res || !res.ok) throw new Error();
            const data = await res.json();
            const isLiked = data.status === 'liked';
            btn.classList.toggle('liked', isLiked);
            btn.innerHTML = `<span>${isLiked ? '❤️' : '🤍'}</span> ${data.likes_count ?? ''}`;
        } catch (e) { console.error('Error en like:', e); }
    }

    // ── FOLLOW ──
    async function followUser(username, btn) {
        try {
            const res = await fetchWithAuth(`/api/users/follow/${username}/`, { method: 'POST' });
            if (!res || !res.ok) throw new Error();
            const data = await res.json();
            btn.textContent = data.status === 'siguiendo' ? 'Siguiendo' : 'Seguir';
            if (data.status === 'siguiendo') { btn.style.background = 'var(--accent)'; btn.style.color = '#fff'; }
            else { btn.style.background = ''; btn.style.color = ''; }
        } catch (e) { console.error('Error en follow:', e); }
    }

    // ── SEARCH ──
    function handleSearch(e) {
        if (e.key === 'Enter') {
            const q = document.getElementById('search-input').value.trim();
            if (q) window.location.href = `/search/?q=${encodeURIComponent(q)}`;
        }
    }

    // ── UI HELPERS ──
    function insertTag(tag) {
        const input = document.getElementById('post-input');
        input.value += tag;
        input.focus();
    }

    function updateCharCount() {
        const input = document.getElementById('post-input');
        const remaining = 280 - input.value.length;
        const counter = document.getElementById('char-count');
        counter.textContent = remaining;
        counter.className = 'char-count' + (remaining < 20 ? ' danger' : remaining < 50 ? ' warn' : '');
    }

    function showError(msg) {
        const banner = document.getElementById('error-banner');
        banner.textContent = '⚠ ' + msg;
        banner.style.display = 'block';
        setTimeout(() => banner.style.display = 'none', 4000);
    }

    let currentCommentPostId = null;

    function viewComments(postId) {
        currentCommentPostId = postId;
        document.getElementById('comments-modal').classList.add('open');
        document.getElementById('comment-input').value = '';
        loadComments(postId);
    }

    function closeComments(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('comments-modal').classList.remove('open');
        currentCommentPostId = null;
    }

    async function loadComments(postId) {
        const list = document.getElementById('comments-list');
        list.innerHTML = '<div class="comment-loading">Cargando comentarios...</div>';
        try {
            const res = await fetchWithAuth(`/api/posts/${postId}/comments/`);
            if (!res || !res.ok) throw new Error();
            const data = await res.json();
            const comments = data.results || data;
            if (!comments || comments.length === 0) {
                list.innerHTML = '<div class="comments-empty"><span class="icon">💬</span><p>Sin comentarios todavía. ¡Sé el primero!</p></div>';
                return;
            }
            list.innerHTML = comments.map(c => renderComment(c)).join('');
        } catch (e) {
            list.innerHTML = '<div class="comments-empty"><span class="icon">⚠️</span><p>No se pudieron cargar los comentarios.</p></div>';
        }
    }

    function renderComment(c) {
        const username = typeof c.user === 'string' ? c.user : (c.user?.username || 'usuario');
        const initial = username[0].toUpperCase();
        const avatarUrl = typeof c.user === 'object' && c.user?.avatar ? c.user.avatar : null;
        const time = formatTime(c.created_at);
        const avatarHtml = avatarUrl
            ? `<img src="${avatarUrl}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">`
            : `<div class="avatar" style="width:32px;height:32px;font-size:0.7rem;">${initial}</div>`;
        return `
        <div class="comment-item">
            ${avatarHtml}
            <div class="comment-body">
                <div class="comment-meta">
                    <span class="comment-author">${username}</span>
                    <span class="comment-time">· ${time}</span>
                </div>
                <div class="comment-text">${c.content}</div>
            </div>
        </div>`;
    }

    async function submitComment() {
        const input = document.getElementById('comment-input');
        const content = input.value.trim();
        if (!content || !currentCommentPostId) return;

        const btn = document.getElementById('btn-comment');
        btn.disabled = true;
        btn.textContent = '...';

        try {
            const res = await fetchWithAuth(`/api/posts/${currentCommentPostId}/comments/`, {
                method: 'POST',
                body: JSON.stringify({ content })
            });
            if (!res || !res.ok) throw new Error();
            const comment = await res.json();
            input.value = '';
            const list = document.getElementById('comments-list');
            const empty = list.querySelector('.comments-empty');
            if (empty) list.innerHTML = '';
            list.insertAdjacentHTML('afterbegin', renderComment(comment));
            updateCommentCount(currentCommentPostId, 1);
        } catch (e) {
            alert('No se pudo enviar el comentario.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Responder';
        }
    }

    function updateCommentCount(postId, delta) {
        const posts = document.querySelectorAll(`.post[data-id="${postId}"]`);
        posts.forEach(post => {
            const btn = post.querySelector('.action-btn:nth-child(2)');
            if (btn) {
                const count = parseInt(btn.textContent.trim()) || 0;
                btn.innerHTML = `<span>💬</span> ${count + delta}`;
            }
        });
    }

    function goToPost(postId) {
        window.location.href = '/post/' + postId + '/';
    }

    function logout() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        window.location.href = '/api/users/logout/';
    }

    // ── THEME ──
    function toggleTheme() {
        const isLight = document.body.getAttribute('data-theme') === 'light';
        document.body.setAttribute('data-theme', isLight ? '' : 'light');
        localStorage.setItem('theme', isLight ? '' : 'light');
        document.getElementById('btn-theme').textContent = isLight ? '🌙' : '☀️';
    }

    function loadTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
            document.body.setAttribute('data-theme', 'light');
            document.getElementById('btn-theme').textContent = '☀️';
        }
    }

    // ── INIT ──
    document.getElementById('post-input').addEventListener('input', updateCharCount);

    loadTheme();
    loadProfile().then(() => loadFeed());
</script>

</body>
