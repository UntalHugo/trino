<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trino — Registrarse</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  body { background: #0f0f0f; color: #e7e9ea; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #16181c; border: 1px solid #2f3336; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
  .logo { font-size: 40px; font-weight: 800; color: #1d9bf0; text-align: center; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #536471; font-size: 14px; margin-bottom: 28px; }
  .form-control-dark { background: #0f0f0f; border: 1px solid #2f3336; color: #e7e9ea; border-radius: 6px; padding: 12px 16px; width: 100%; font-size: 15px; outline: none; margin-bottom: 12px; transition: border 0.15s; box-sizing: border-box; }
  .form-control-dark:focus { border-color: #1d9bf0; }
  .input-label { font-size: 12px; color: #536471; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .btn-primary-dark { background: #1d9bf0; color: #fff; border: none; border-radius: 9999px; padding: 12px; width: 100%; font-weight: 700; font-size: 15px; cursor: pointer; transition: background 0.15s; margin-top: 8px; }
  .btn-primary-dark:hover { background: #1a8cd8; }
  .btn-primary-dark:disabled { opacity: 0.5; cursor: default; }
  .error-msg { background: rgba(244,33,46,0.1); border: 1px solid #f4212e; color: #f4212e; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
  .success-msg { background: rgba(29,155,240,0.1); border: 1px solid #1d9bf0; color: #1d9bf0; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
  .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: #536471; }
  .login-link a { color: #1d9bf0; text-decoration: none; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: #536471; font-size: 13px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #2f3336; }
  .btn-oauth { background: transparent; border: 1px solid #2f3336; color: #e7e9ea; border-radius: 9999px; padding: 10px; width: 100%; font-size: 14px; cursor: pointer; transition: background 0.15s; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
  .btn-oauth:hover { background: #1a1a1a; color: #e7e9ea; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Trino</div>
  <div class="subtitle">Creá tu cuenta</div>

  <div id="error-box" style="display:none" class="error-msg"></div>
  <div id="success-box" style="display:none" class="success-msg"></div>

  <div class="input-label">Usuario</div>
  <input class="form-control-dark" type="text" id="username" placeholder="@tunombre">

  <div class="input-label">Email</div>
  <input class="form-control-dark" type="email" id="email" placeholder="tu@email.com">

  <div class="input-label">Contraseña</div>
  <input class="form-control-dark" type="password" id="password" placeholder="Mínimo 8 caracteres">

  <div class="input-label">Confirmar contraseña</div>
  <input class="form-control-dark" type="password" id="password2" placeholder="Repetí la contraseña" onkeydown="if(event.key==='Enter') register()">

  <button class="btn-primary-dark" id="btn-register" onclick="register()">Crear cuenta</button>

  <div class="divider">o registrate con</div>

  <a href="/auth/login/google-oauth2/" class="btn-oauth">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Continuar con Google
  </a>

  <a href="/auth/login/github/" class="btn-oauth">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#e7e9ea"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
    Continuar con GitHub
  </a>

  <div class="login-link">
    ¿Ya tenés cuenta? <a href="/accounts/login/">Iniciar sesión</a>
  </div>
</div>

<script>
async function register() {
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const errorBox = document.getElementById('error-box');
  const successBox = document.getElementById('success-box');
  const btn = document.getElementById('btn-register');

  errorBox.style.display = 'none';
  successBox.style.display = 'none';

  if (!username || !email || !password || !password2) {
    errorBox.textContent = 'Completá todos los campos.';
    errorBox.style.display = 'block';
    return;
  }

  if (password !== password2) {
    errorBox.textContent = 'Las contraseñas no coinciden.';
    errorBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creando cuenta...';

  try {
    const res = await fetch('/api/users/register/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password, password2 })
    });
    const data = await res.json();

    if (res.ok) {
      successBox.textContent = '¡Cuenta creada! Iniciando sesión...';
      successBox.style.display = 'block';

      const loginRes = await fetch('/api/auth/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (loginRes.ok) {
        window.location.href = '/feed/';
      } else {
        window.location.href = '/accounts/login/';
      }
    } else {
      const errors = Object.values(data).flat().join(' ');
      errorBox.textContent = errors;
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Crear cuenta';
    }
  } catch(e) {
    errorBox.textContent = 'Error de conexión.';
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Crear cuenta';
  }
}
</script>
</body>
</html>
