<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
        <div class="card-body">
            <h2 class="text-center mb-4 fw-bold text-primary">¡Bienvenido!</h2>
            <p class="text-muted text-center small mb-4">Ingresa tus datos para continuar</p>
            
            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                    <div class="alert alert-danger small p-2" role="alert">
                        Usuario o contraseña incorrectos.
                    </div>
                {% endif %}

                <div class="mb-3">
                    <label for="id_username" class="form-label small fw-semibold">Usuario</label>
                    <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                </div>

                <div class="mb-4">
                    <label for="id_password" class="form-label small fw-semibold">Contraseña</label>
                    <input type="password" name="password" id="id_password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Iniciar Sesión</button>
            </form>
        </div>
    </div>

</body>
</html>
