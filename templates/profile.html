<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trino — Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #16161f;
            --border: #1e1e2e;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.2);
            --text: #e8e8f0;
            --muted: #5a5a7a;
            --like: #ff4f6d;
            --success: #4fffb0;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --surface: #f5f5f8;
            --surface2: #e8e8f0;
            --border: #d0d0da;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --text: #0a0a0f;
            --muted: #8a8aaa;
            --like: #e0455e;
            --success: #2ea87a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 260px 1fr 300px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .sidebar-left {
            padding: 1.5rem 1rem;
            border-right: 1px solid var(--border);
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -1px;
            text-decoration: none;
        }

        .logo span { color: var(--accent); }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            cursor: pointer;
        }

        .nav-item:hover { background: var(--surface2); }
        .nav-item.active { color: var(--accent); background: rgba(108,99,255,0.08); }

        .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }

        .btn-post {
            margin-top: 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.85rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px var(--accent-glow);
            width: 100%;
        }

        .btn-post:hover { opacity: 0.9; box-shadow: 0 6px 24px rgba(108,99,255,0.35); }

        .btn-logout {
            background: none;
            border: 1px solid rgba(255, 79, 109, 0.3);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            color: #ff4f6d;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-logout:hover { background: rgba(255, 79, 109, 0.1); border-color: #ff4f6d; }

        .btn-theme {
            background: none;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-theme:hover { background: var(--surface2); border-color: var(--accent); }

        .user-card {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .user-card:hover { background: var(--surface2); }

        .avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #63b3ff);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.875rem; color: #fff;
            flex-shrink: 0;
        }

        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-size: 0.875rem; font-weight: 600; }
        .user-handle { font-size: 0.75rem; color: var(--muted); }

        .main-content {
            border-right: 1px solid var(--border);
            min-height: 100vh;
        }

        .profile-header {
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .profile-banner {
            height: 180px;
            background: linear-gradient(135deg, var(--accent), #63b3ff);
            opacity: 0.6;
        }

        .profile-info {
            padding: 1.25rem 1.5rem;
            position: relative;
        }

        .profile-avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #63b3ff);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 2rem; color: #fff;
            position: absolute;
            top: -40px;
            border: 4px solid var(--bg);
            flex-shrink: 0;
        }

        .profile-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.75rem;
        }

        .btn-follow {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 0.5rem 1.25rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-follow:hover { opacity: 0.85; }
        .btn-follow.following { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

        .btn-edit-profile {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.5rem 1.25rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            color: var(--text);
        }

        .btn-edit-profile:hover { background: var(--surface2); border-color: var(--accent); }

        /* ── EDIT PROFILE MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 6px;
            transition: color 0.15s;
        }

        .modal-close:hover { color: var(--text); }

        .modal-body {
            padding: 1.25rem;
        }

        .modal-field {
            margin-bottom: 1rem;
        }

        .modal-field label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .modal-field input,
        .modal-field textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            resize: vertical;
        }

        .modal-field input:focus,
        .modal-field textarea:focus {
            border-color: var(--accent);
        }

        .modal-field input::placeholder,
        .modal-field textarea::placeholder {
            color: var(--muted);
        }

        .btn-save-profile {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save-profile:hover { opacity: 0.85; }
        .btn-save-profile:disabled { opacity: 0.4; cursor: not-allowed; }

        .profile-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 1.5rem;
        }

        .profile-username {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }

        .profile-bio {
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .profile-stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
        }

        .stat { cursor: pointer; }
        .stat strong { color: var(--text); font-weight: 600; }
        .stat span { color: var(--muted); }

        .profile-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.85rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--muted);
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
            border-bottom: 2px solid transparent;
        }

        .tab:hover { color: var(--text); background: rgba(108,99,255,0.04); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .post {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.85rem;
            transition: background 0.15s;
            cursor: pointer;
        }

        .post:hover { background: rgba(255,255,255,0.015); }

        .post-body { flex: 1; }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .post-author { font-weight: 600; font-size: 0.9rem; }
        .post-handle, .post-time { font-size: 0.8rem; color: var(--muted); }

        .post-content {
            font-size: 0.95rem;
            line-height: 1.55;
            margin-bottom: 0.75rem;
            color: var(--text);
        }

        .post-content .hashtag { color: var(--accent); }
        .post-content .mention { color: #63b3ff; }

        .post-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            max-height: 280px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .post-actions {
            display: flex;
            gap: 1.5rem;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background: none;
            border: none;
            color: var(--muted);
            font-size: 0.825rem;
            cursor: pointer;
            padding: 0.25rem 0;
            transition: color 0.15s;
            font-family: 'DM Sans', sans-serif;
        }

        .action-btn:hover { color: var(--accent); }
        .action-btn.liked { color: var(--like); }
        .action-btn.liked:hover { color: var(--like); }
        .action-btn span { font-size: 1rem; }

        .skeleton-post {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.85rem;
        }

        .skel {
            background: var(--surface2);
            border-radius: 6px;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .skel-avatar { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; }
        .skel-body { flex: 1; }
        .skel-line { height: 12px; margin-bottom: 8px; }
        .skel-line.w-40 { width: 40%; }
        .skel-line.w-80 { width: 80%; }
        .skel-line.w-60 { width: 60%; }

        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--muted);
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
        .empty-state h3 { font-family: 'Syne', sans-serif; color: var(--text); margin-bottom: 0.5rem; }

        .error-banner {
            background: rgba(255,79,109,0.08);
            border: 1px solid rgba(255,79,109,0.2);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #ff4f6d;
            font-size: 0.825rem;
            margin: 1rem 1.25rem;
            display: none;
        }

        .sidebar-right {
            padding: 1.5rem 1rem;
        }

        .search-box {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .search-box input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.65rem 1rem 0.65rem 2.25rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: var(--muted); }

        .search-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.9rem;
        }

        .widget {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .widget h3 {
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .suggest-user { display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0; }
        .suggest-info { flex: 1; }
        .suggest-name { font-size: 0.875rem; font-weight: 600; }
        .suggest-handle { font-size: 0.75rem; color: var(--muted); }
        .btn-follow-small { background: none; border: 1px solid var(--accent); border-radius: 20px; padding: 0.3rem 0.85rem; color: var(--accent); font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: background 0.15s, color 0.15s; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
        .btn-follow-small:hover { background: var(--accent); color: #fff; }

        /* ── FOLLOWERS MODAL ── */
        .followers-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
        .ftab { flex: 1; text-align: center; padding: 0.65rem; font-weight: 500; font-size: 0.85rem; color: var(--muted); cursor: pointer; transition: color 0.15s, border-color 0.15s; border-bottom: 2px solid transparent; background: none; font-family: 'DM Sans', sans-serif; }
        .ftab:hover { color: var(--text); background: rgba(108,99,255,0.04); }
        .ftab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .follow-user { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0; }
        .follow-user-info { flex: 1; }
        .follow-user-name { font-size: 0.875rem; font-weight: 600; }
        .follow-user-handle { font-size: 0.75rem; color: var(--muted); }

        /* ── COMPOSE MODAL ── */
        .compose-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200; justify-content: center; align-items: center; }
        .compose-modal-overlay.open { display: flex; }
        .compose-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 520px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .compose-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
        .compose-modal-header h3 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
        .compose-modal-close { background: none; border: none; color: var(--muted); font-size: 1.25rem; cursor: pointer; padding: 0.25rem; border-radius: 6px; transition: color 0.15s; }
        .compose-modal-close:hover { color: var(--text); }
        .compose-modal-body { padding: 1.25rem; }
        .compose-modal-composer { display: flex; gap: 0.75rem; }
        .compose-modal-input-wrap { flex: 1; }
        .compose-modal-input-wrap textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; resize: none; min-height: 80px; }
        .compose-modal-input-wrap textarea::placeholder { color: var(--muted); }
        .compose-modal-actions { display: flex; align-items: center; justify-content: space-between; padding-top: 0.75rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
        .compose-modal-tools { display: flex; gap: 0.5rem; }

        @media (max-width: 1024px) {
            body { grid-template-columns: 70px 1fr; }
            .sidebar-right { display: none; }
            .nav-item span:not(.nav-icon) { display: none; }
            .logo span:last-child { display: none; }
            .btn-post { padding: 0.85rem; font-size: 0; }
            .btn-post::before { content: '✏️'; font-size: 1.1rem; }
            .user-card .user-info { display: none; }
        }

        @media (max-width: 640px) {
            body { grid-template-columns: 1fr; }
            .sidebar-left { display: none; }
        }
    </style>
</head>
<body>

<nav class="sidebar-left">
    <a class="logo" href="/feed/">🐦 <span>Trino</span></a>

    <a class="nav-item" href="/feed/">
        <span class="nav-icon">🏠</span> Inicio
    </a>
    <a class="nav-item" href="/search/">
        <span class="nav-icon">🔍</span> Explorar
    </a>
    <a class="nav-item" href="/notifications/" id="nav-notifs">
        <span class="nav-icon">🔔</span> Notificaciones
    </a>
    <a class="nav-item" href="/messages/" id="nav-messages">
        <span class="nav-icon">✉️</span> Mensajes
    </a>
    <a class="nav-item active" href="/profile/" id="nav-profile">
        <span class="nav-icon">👤</span> Perfil
    </a>

    <button class="btn-post" id="btn-post">Trinar</button>

    <button class="btn-logout" id="btn-logout">🚪 Cerrar sesión</button>

    <button class="btn-theme" id="btn-theme" title="Cambiar tema">🌙</button>

    <div class="user-card" id="user-card">
        <div class="avatar" id="user-avatar">?</div>
        <div class="user-info">
            <div class="user-name" id="user-name">Cargando...</div>
            <div class="user-handle" id="user-handle">@...</div>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="profile-header">
        <div class="profile-banner"></div>
        <div class="profile-info">
            <div class="profile-avatar" id="profile-avatar">?</div>
            <div class="profile-actions">
                <button class="btn-follow" id="btn-follow" style="display:none;" onclick="toggleFollow()">Seguir</button>
                <button class="btn-edit-profile" id="btn-edit-profile" style="display:none;" onclick="openEditProfile()">Editar perfil</button>
            </div>
            <div class="profile-name" id="profile-name">Cargando...</div>
            <div class="profile-username" id="profile-username">@...</div>
            <div class="profile-bio" id="profile-bio"></div>
            <div class="profile-stats">
                <div class="stat"><strong id="stat-following">0</strong> <span>Siguiendo</span></div>
                <div class="stat"><strong id="stat-followers">0</strong> <span>Seguidores</span></div>
            </div>
        </div>
    </div>

    <div class="profile-tabs">
        <div class="tab active" data-tab="posts">Trinos</div>
        <div class="tab" data-tab="likes">Me gusta</div>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <div id="posts-container">
        <div class="skeleton-post">
            <div class="skel skel-avatar"></div>
            <div class="skel-body">
                <div class="skel skel-line w-40"></div>
                <div class="skel skel-line w-80"></div>
                <div class="skel skel-line w-60"></div>
            </div>
        </div>
        <div class="skeleton-post">
            <div class="skel skel-avatar"></div>
            <div class="skel-body">
                <div class="skel skel-line w-40"></div>
                <div class="skel skel-line w-80"></div>
                <div class="skel skel-line w-60"></div>
            </div>
        </div>
    </div>
</main>

<!-- EDIT PROFILE MODAL -->
<div class="modal-overlay" id="edit-profile-modal" onclick="if(event.target===this)closeEditProfile()">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3>Editar perfil</h3>
            <button class="modal-close" onclick="closeEditProfile()">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-field" style="margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.25rem;">
                <label for="edit-display-name" style="font-weight: 600; font-size: 0.85rem; color: var(--text);">Nombre de perfil</label>
                <input type="text" id="edit-display-name" placeholder="Tu nombre para mostrar" maxlength="50" style="width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; color: var(--text); outline: none;">
            </div>

            <div class="modal-field">

    const API = '';

    function compressImage(file, maxWidth = 1000, quality = 0.75) {
        return new Promise((resolve) => {
            if (!file || !file.type.startsWith('image/')) {
                resolve(file);
                return;
            }
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob(blob => {
                        if (blob) {
                            const compressedFile = new File([blob], file.name.substring(0, file.name.lastIndexOf('.')) + '.jpg', {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            });
                            resolve(compressedFile);
                        } else {
                            resolve(file);
                        }
                    }, 'image/jpeg', quality);
                };
                img.onerror = () => resolve(file);
            };
            reader.onerror = () => resolve(file);
        });
    }

    async function fetchWithAuth(url, options = {}) {
        if (!accessToken) { logoutAndRedirect(); return null; }

        options.headers = {
            ...options.headers,
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${accessToken}`
        };

        let res = await fetch(url, options);

        if (res.status === 401) {
            const refreshToken = localStorage.getItem('refresh_token');
            if (refreshToken) {
                try {
                    const refreshRes = await fetch('/api/auth/refresh/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refresh: refreshToken })
                    });
                    if (refreshRes.ok) {
                        const data = await refreshRes.json();
                        accessToken = data.access;
                        localStorage.setItem('access_token', accessToken);
                        options.headers['Authorization'] = `Bearer ${accessToken}`;
                        res = await fetch(url, options);
                    } else {
                        logoutAndRedirect();
                    }
                } catch (e) {
                    logoutAndRedirect();
                }
            } else {
                logoutAndRedirect();
            }
        }
        return res;
    }

    async function fetchWithAuthMultipart(url, options = {}) {
        if (!accessToken) { logoutAndRedirect(); return null; }

        options.headers = {
            ...options.headers,
            'Authorization': `Bearer ${accessToken}`
        };

        let res = await fetch(url, options);

        if (res.status === 401) {
            const refreshToken = localStorage.getItem('refresh_token');
            if (refreshToken) {
                try {
                    const refreshRes = await fetch('/api/auth/refresh/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refresh: refreshToken })
                    });
                    if (refreshRes.ok) {
                        const data = await refreshRes.json();
                        accessToken = data.access;
                        localStorage.setItem('access_token', accessToken);
                        options.headers['Authorization'] = `Bearer ${accessToken}`;
                        res = await fetch(url, options);
                    } else {
                        logoutAndRedirect();
                    }
                } catch (e) {
                    logoutAndRedirect();
                }
            } else {
                logoutAndRedirect();
            }
        }
        return res;
    }

    function logoutAndRedirect() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        window.location.href = '/accounts/login/';
    }

    async function getSessionToken() {
        try {
            const res = await fetch('/api/users/session-token/');
            if (res.ok) {
                const data = await res.json();
                accessToken = data.access;
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);
                return true;
            }
        } catch (e) {}
        return false;
    }

async function loadProfile() {

   function renderProfile(user) {
    // ─── PRIORIZAMOS EL NOMBRE DE PERFIL (first_name) ───

    const displayName = user.first_name ? user.first_name : user.username;

    function renderPosts(posts) {
        const container = document.getElementById('posts-container');
        if (!posts || posts.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <span class="icon">🐦</span>
                    <h3>Sin trinos todavía</h3>
                    <p>Este usuario no ha publicado nada aún.</p>
                </div>`;
            return;
        }
        container.innerHTML = posts.map(post => renderPost(post)).join('');
    }

    function renderPost(post) {
        const author = post.author || post.user || {};
        const username = typeof author === 'string' ? author : (author.username || 'usuario');
        const displayName = typeof author === 'string' ? author : (author.first_name || username);
        const avatarUrl = typeof author === 'object' ? (author.avatar || null) : null;
        const initial = (typeof author === 'string' ? author : username)[0].toUpperCase();
        const content = formatContent(post.content || '');
        const time = formatTime(post.created_at);
        const imageHtml = post.image ? `<img src="${post.image}" class="post-image" alt="imagen">` : '';
        const avatarHtml = avatarUrl
            ? `<img src="${avatarUrl}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;">`
            : `<div class="avatar">${initial}</div>`;

        return `
        <div class="post" data-id="${post.id}" onclick="goToPost(${post.id})">
            ${avatarHtml}
            <div class="post-body">
                <div class="post-meta">
                    <span class="post-author">${displayName}</span>
                    <span class="post-handle">@${username}</span>
                    <span class="post-handle">·</span>
                    <span class="post-time">${time}</span>
                </div>
                <div class="post-content">${content}</div>
                ${imageHtml}
                <div class="post-actions" onclick="event.stopPropagation()">
                    <button class="action-btn" onclick="toggleLike(${post.id}, this)">
                        <span>🤍</span>
                    </button>
                    <button class="action-btn" onclick="viewComments(${post.id})">
                        <span>💬</span>
                    </button>
                </div>
            </div>
        </div>`;
    }

    function formatContent(text) {
        return text
            .replace(/#(\w+)/g, '<span class="hashtag">#$1</span>')
            .replace(/@(\w+)/g, '<span class="mention">@$1</span>');
    }

    function formatTime(dateStr) {
        if (!dateStr) return '';
        const diff = (Date.now() - new Date(dateStr)) / 1000;
        if (diff < 60) return 'ahora';
        if (diff < 3600) return Math.floor(diff / 60) + 'm';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h';
        return Math.floor(diff / 86400) + 'd';
    }

    async function createPostFromModal() {
        const input = document.getElementById('compose-modal-input');

        const btn = document.getElementById('compose-modal-btn-trinar');

        try {
            const formData = new FormData();

                formData.append('image', compressed);

            const res = await fetchWithAuth('/api/posts/posts/', { method: 'POST', body: formData });

async function saveProfile() {
    // 1. Capturamos los tres valores (incluyendo el nuevo campo del nombre)
    const displayName = document.getElementById('edit-display-name').value.trim();
    const bio = document.getElementById('edit-bio').value.trim();
    const avatarFile = document.getElementById('edit-avatar').files[0];
    const btn = document.getElementById('btn-save-profile');

    // Validación básica
    if (!displayName) {
        alert('El nombre de perfil no puede estar vacío.');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
        // 2. Metemos todo dentro del FormData
        const formData = new FormData();
        formData.append('first_name', displayName); // Enviamos el nombre
        formData.append('bio', bio);
        if (avatarFile) {
            const compressedAvatar = await compressImage(avatarFile, 400, 0.8);
            formData.append('avatar', compressedAvatar);
        }

        // 3. Hacemos la petición usando tu función Multipart
        const res = await fetchWithAuthMultipart('/api/users/profile/', {
            method: 'PATCH',
            body: formData
        });

        if (!res || !res.ok) throw new Error();
        
        // 4. El backend responde con los datos actualizados
        const updated = await res.json();
        profileUser = updated;

        // 5. Forzamos la actualización visual inmediata en la pantalla actual
        const nameToShow = updated.first_name ? updated.first_name : updated.username;
        if (document.getElementById('profile-name')) {
            document.getElementById('profile-name').textContent = nameToShow;
        }
        if (document.getElementById('user-name')) {
            document.getElementById('user-name').textContent = nameToShow;
        }
        
        if (document.getElementById('profile-bio')) {
            document.getElementById('profile-bio').textContent = updated.bio || '';
        }
        renderProfileAvatar(updated);
        
        // 6. Sincronizamos la barra lateral/global volviendo a pedir el perfil al servidor
        await loadProfile(); 
        
        closeEditProfile();
        
    } catch (e) {
        console.error(e);
        alert('No se pudo guardar el perfil.');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar cambios';
    }
}

    function renderProfileAvatar(user) {
        const avatarEl = document.getElementById('profile-avatar');
        const sidebarAvatar = document.getElementById('user-avatar');
        const initial = (user.username || '?')[0].toUpperCase();
        if (user.avatar) {
            avatarEl.innerHTML = `<img src="${user.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
            avatarEl.style.background = 'none';
            sidebarAvatar.innerHTML = `<img src="${user.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
            sidebarAvatar.style.background = 'none';
        } else {
            avatarEl.textContent = initial;
            avatarEl.style.background = '';
            sidebarAvatar.textContent = initial;
            sidebarAvatar.style.background = '';
        }
    }

    // ── THEME ──
    function toggleTheme() {
        const isLight = document.body.getAttribute('data-theme') === 'light';
        document.body.setAttribute('data-theme', isLight ? '' : 'light');
        localStorage.setItem('theme', isLight ? '' : 'light');
        document.getElementById('btn-theme').textContent = isLight ? '🌙' : '☀️';
    }

    function loadTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
            document.body.setAttribute('data-theme', 'light');
            document.getElementById('btn-theme').textContent = '☀️';
        }
    }

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            if (!profileUser) return;
            if (this.dataset.tab === 'likes') {
                loadLikedPosts(profileUser.username);
            } else {
                loadPosts(profileUser.username);
            }
        });
    });

    document.getElementById('btn-logout').addEventListener('click', logout);
    document.getElementById('btn-theme').addEventListener('click', toggleTheme);
    document.getElementById('user-card').addEventListener('click', function() { window.location.href = '/profile/'; });
    document.getElementById('stat-following').addEventListener('click', function() { openFollowersModal('following'); });
    document.getElementById('stat-followers').addEventListener('click', function() { openFollowersModal('followers'); });
    document.getElementById('btn-post').addEventListener('click', openComposeModal);
    document.getElementById('compose-modal-close').addEventListener('click', closeComposeModal);
    document.getElementById('compose-modal').addEventListener('click', function(e) { if (e.target === this) closeComposeModal(); });
    document.getElementById('compose-modal-btn-trinar').addEventListener('click', createPostFromModal);
    document.getElementById('compose-modal-input').addEventListener('input', updateComposeCharCount);
    document.getElementById('compose-modal-image-input').addEventListener('change', previewComposeImage);
    document.getElementById('compose-modal-btn-clear-image').addEventListener('click', clearComposeImage);
    document.getElementById('compose-modal-image-btn').addEventListener('click', function() { document.getElementById('compose-modal-image-input').click(); });
    document.getElementById('compose-modal-hashtag-btn').addEventListener('click', function() { insertComposeTag('#'); });
    document.getElementById('compose-modal-mention-btn').addEventListener('click', function() { insertComposeTag('@'); });
    document.querySelectorAll('.ftab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.ftab').forEach(function(t) { t.classList.remove('active'); });
            this.classList.add('active');
            loadFollowersList(this.dataset.ftab);
        });
    });
    document.getElementById('followers-modal').addEventListener('click', function(e) { if (e.target === this) closeFollowersModal(); });

    document.getElementById('search-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const q = this.value.trim();
            if (q) window.location.href = '/search/?q=' + encodeURIComponent(q);
        }
    });

    loadTheme();
    loadProfile().then(function() { loadProfilePage(); loadSuggestions(); });
</script>

</body>
</html>
